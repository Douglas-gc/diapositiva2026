<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muchas gracias por su atención</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Exo+2:wght@200;300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:   #00e5ff;
    --cyan2:  #00f5ff;
    --violet: #7c3aed;
    --white:  #e8f4ff;
    --dark:   #020b18;
    --glow:   0 0 24px #00e5ffcc, 0 0 60px #00e5ff55;
    --glow-v: 0 0 18px #7c3aedaa;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    cursor: none;
    font-family: 'Exo 2', sans-serif;
  }

  /* ── Layers ── */
  #bg-canvas      { position: fixed; inset: 0; z-index: 0; }
  #lightning-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  .vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center,
      transparent 30%, rgba(2,11,24,.88) 100%);
    pointer-events: none;
  }

  /* ── Center stage ── */
  .stage {
    position: fixed; inset: 0; z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    pointer-events: none;
    padding: 20px;
  }

  /* ── Decorative ring ── */
  .ring {
    position: absolute;
    width: min(420px, 90vw);
    height: min(420px, 90vw);
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,.1);
    animation: ringPulse 4s ease-in-out infinite;
  }
  .ring:nth-child(2) {
    width: min(340px, 74vw);
    height: min(340px, 74vw);
    border-color: rgba(124,58,237,.12);
    animation-delay: -.8s;
  }
  .ring:nth-child(3) {
    width: min(260px, 58vw);
    height: min(260px, 58vw);
    border-color: rgba(0,229,255,.08);
    animation-delay: -1.6s;
  }
  @keyframes ringPulse {
    0%,100% { opacity: .4; transform: scale(1); }
    50%      { opacity: .9; transform: scale(1.03); }
  }

  /* ── Emoji ── */
  .emoji-top {
    font-size: clamp(3rem, 10vw, 5.5rem);
    line-height: 1;
    margin-bottom: 18px;
    opacity: 0;
    animation: zoomIn .8s .2s cubic-bezier(.22,1,.36,1) forwards;
    filter: drop-shadow(0 0 18px rgba(0,229,255,.6));
  }

  /* ── Main title ── */
  .main-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5.5vw, 3.6rem);
    letter-spacing: .08em;
    text-align: center;
    color: var(--white);
    text-shadow:
      0 0 14px rgba(0,229,255,.7),
      0 0 40px rgba(0,229,255,.3),
      0 0 80px rgba(0,229,255,.15);
    line-height: 1.2;
    opacity: 0;
    animation: zoomIn .9s .55s cubic-bezier(.22,1,.36,1) forwards;
    max-width: 780px;
  }

  /* ── Subtitle ── */
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(.75rem, 2.2vw, 1rem);
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,229,255,.5);
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp .7s 1.1s forwards;
  }

  /* ── Divider line ── */
  .line-deco {
    width: 0;
    height: 2px;
    margin: 22px auto 0;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
    box-shadow: var(--glow);
    animation: lineGrow .9s 1.4s cubic-bezier(.22,1,.36,1) forwards;
    border-radius: 2px;
  }
  @keyframes lineGrow {
    to { width: min(360px, 80vw); }
  }

  /* ── Credits strip ── */
  .credits {
    font-family: 'Exo 2', sans-serif;
    font-weight: 200;
    font-size: clamp(.72rem, 1.9vw, .88rem);
    letter-spacing: .14em;
    color: rgba(150,190,220,.55);
    margin-top: 22px;
    text-align: center;
    opacity: 0;
    animation: fadeUp .6s 1.8s forwards;
  }

  /* ── Keyframes ── */
  @keyframes zoomIn {
    from { opacity: 0; transform: scale(.82); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Navigation ── */
  .nav-arrow {
    position: fixed; bottom: 28px; z-index: 10;
    text-decoration: none; font-size: 1.4rem;
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 1.5px solid rgba(0,229,255,.35);
    color: var(--cyan);
    background: rgba(0,229,255,.06);
    backdrop-filter: blur(6px);
    transition: all .3s cubic-bezier(.22,1,.36,1);
    text-shadow: var(--glow);
    box-shadow: 0 0 12px rgba(0,229,255,.1);
    cursor: none;
  }
  .nav-arrow:hover {
    border-color: var(--cyan);
    background: rgba(0,229,255,.15);
    box-shadow: var(--glow), 0 0 30px rgba(0,229,255,.2);
    transform: scale(1.12);
  }
  .nav-arrow.left { left: 28px; }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed; top: 0; left: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: screen;
    transition: transform .05s;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .nav-arrow { width: 44px; height: 44px; font-size: 1.2rem; bottom: 18px; }
    .nav-arrow.left { left: 18px; }
    .stage { padding: 14px; }
  }
  @media (hover: none) {
    #cursor { display: none; }
    body { cursor: default; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<canvas id="lightning-canvas"></canvas>
<div id="cursor"></div>

<div class="stage">
  <!-- decorative rings -->
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>

  <div class="emoji-top"></div>
  <h1 class="main-title">Muchas gracias por su atención</h1>
  <p class="subtitle">Univ.Douglas Gutierrez Cuñaca</p>
  <div class="line-deco"></div>
  <p class="credits">Tecnología · Arquitectura · Innovación</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ══════════════════════════════════════════
   THREE.JS BACKGROUND — particles
══════════════════════════════════════════ */
(function () {
  const canvas   = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, .1, 1000);
  camera.position.z = 80;

  scene.add(new THREE.AmbientLight(0x080e1e, 2));
  const pl1 = new THREE.PointLight(0x00e5ff, 2.5, 200);
  pl1.position.set(0, 40, 60); scene.add(pl1);
  const pl2 = new THREE.PointLight(0x7c3aed, 2, 200);
  pl2.position.set(-60, -30, 40); scene.add(pl2);

  // Particles
  const N = 1600;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const C1 = new THREE.Color(0x00e5ff);
  const C2 = new THREE.Color(0x7c3aed);
  const C3 = new THREE.Color(0xffffff);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-.5)*280;
    pos[i*3+1] = (Math.random()-.5)*170;
    pos[i*3+2] = (Math.random()-.5)*130;
    const t = Math.random();
    const c = t < .5 ? C1.clone().lerp(C3, t*2) : C2.clone().lerp(C1, (t-.5)*2);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 1.3, vertexColors: true,
    transparent: true, opacity: .7,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  scene.add(pts);

  // Data streams
  const lmat = new THREE.LineBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: .07,
    blending: THREE.AdditiveBlending,
  });
  for (let l = 0; l < 18; l++) {
    const lpts = [];
    const x = (Math.random()-.5)*280, z = (Math.random()-.5)*130;
    for (let s = 0; s < 8; s++)
      lpts.push(new THREE.Vector3(x+(Math.random()-.5)*8,
        (Math.random()-.5)*170, z+(Math.random()-.5)*8));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(lpts), lmat));
  }

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    t += .0005;
    pts.rotation.y = t * .25;
    pts.rotation.x = t * .1;
    pl1.position.set(Math.sin(t*1.1)*65, Math.cos(t*.8)*42, 60);
    pl2.position.set(Math.cos(t*.9)*55,  Math.sin(t*.7)*38, 40);
    renderer.render(scene, camera);
  })();
})();

/* ══════════════════════════════════════════
   LIGHTNING CURSOR EFFECT
══════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('lightning-canvas');
  const ctx    = canvas.getContext('2d');
  let W = canvas.width  = innerWidth;
  let H = canvas.height = innerHeight;

  window.addEventListener('resize', () => {
    W = canvas.width  = innerWidth;
    H = canvas.height = innerHeight;
  });

  // Mouse / touch tracking
  let mx = W / 2, my = H / 2;
  let px = mx, py = my;

  const dot = document.getElementById('cursor');
  function setMouse(x, y) { mx = x; my = y; dot.style.left = x+'px'; dot.style.top = y+'px'; }

  document.addEventListener('mousemove', e => setMouse(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    setMouse(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  // ── Lightning bolt generator ──
  // Generates zig-zag points between (x0,y0) and (x1,y1)
  function lightningPoints(x0, y0, x1, y1, segments, spread) {
    const pts = [{ x: x0, y: y0 }];
    for (let i = 1; i < segments; i++) {
      const t   = i / segments;
      const mx_ = x0 + (x1 - x0) * t;
      const my_ = y0 + (y1 - y0) * t;
      const dx  = x1 - x0, dy = y1 - y0;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      // Perpendicular offset
      const nx  = -dy / len, ny = dx / len;
      const off = (Math.random() - .5) * spread;
      pts.push({ x: mx_ + nx * off, y: my_ + ny * off });
    }
    pts.push({ x: x1, y: y1 });
    return pts;
  }

  // Draw a single lightning bolt
  function drawBolt(pts, alpha, width, color, glowColor, glowBlur) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';

    // Glow pass
    ctx.shadowColor = glowColor;
    ctx.shadowBlur  = glowBlur;
    ctx.strokeStyle = glowColor;
    ctx.lineWidth   = width * 2.5;
    ctx.globalAlpha = alpha * .3;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    // Core line
    ctx.shadowBlur  = glowBlur * .5;
    ctx.strokeStyle = color;
    ctx.lineWidth   = width;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
  }

  // Draw a small spark at a point
  function drawSpark(x, y, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    const r = Math.random() * 5 + 2;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(.3, '#00f5ff');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle  = grad;
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur  = 16;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Active bolt pool
  const bolts = [];
  const MAX_BOLTS = 12;

  function spawnBolts(fromX, fromY, toX, toY) {
    const dist = Math.hypot(toX - fromX, toY - fromY);
    if (dist < 4) return;

    const count = Math.floor(Math.random() * 2) + 1;
    for (let b = 0; b < count && bolts.length < MAX_BOLTS; b++) {
      const segs   = Math.floor(dist / 12) + 3;
      const spread = Math.min(dist * .45, 60);
      const pts    = lightningPoints(fromX, fromY, toX, toY, segs, spread);

      // Optional branch
      let branch = null;
      if (Math.random() < .4 && pts.length > 2) {
        const bi  = Math.floor(Math.random() * (pts.length - 2)) + 1;
        const bPt = pts[bi];
        const bSegs = Math.floor(segs * .5) + 2;
        const bEnd  = {
          x: bPt.x + (Math.random()-.5) * spread * 1.2,
          y: bPt.y + (Math.random()-.5) * spread * 1.2,
        };
        branch = lightningPoints(bPt.x, bPt.y, bEnd.x, bEnd.y, bSegs, spread * .4);
      }

      // Color variation
      const usePurple = Math.random() < .25;
      bolts.push({
        pts,
        branch,
        alpha:   1,
        width:   Math.random() * 1.4 + .8,
        color:   usePurple ? '#b57bff' : (Math.random() < .5 ? '#ffffff' : '#00f5ff'),
        glow:    usePurple ? '#7c3aed'  : '#00e5ff',
        glowBlur: Math.random() * 12 + 14,
        life:    0,
        maxLife: Math.floor(Math.random() * 7) + 5,    // frames
        flicker: Math.random() < .5,
      });
    }
  }

  // Throttle spawn
  let spawnThrottle = 0;

  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);

    // Spawn new bolts following cursor movement
    const dist = Math.hypot(mx - px, my - py);
    if (dist > 6 && spawnThrottle <= 0) {
      spawnBolts(px, py, mx, my);
      // Also fire small random branches from cursor
      if (Math.random() < .35) {
        const spread = 50 + Math.random() * 60;
        const ang = Math.random() * Math.PI * 2;
        spawnBolts(mx, my,
          mx + Math.cos(ang) * spread,
          my + Math.sin(ang) * spread);
      }
      px = mx; py = my;
      spawnThrottle = 2;
    }
    spawnThrottle--;

    // Render bolts
    for (let i = bolts.length - 1; i >= 0; i--) {
      const b = bolts[i];
      b.life++;
      const progress = b.life / b.maxLife;
      b.alpha = Math.pow(1 - progress, .8);

      // Flicker effect
      const flickAlpha = b.flicker
        ? b.alpha * (Math.random() < .35 ? .15 : 1)
        : b.alpha;

      if (flickAlpha > .01) {
        drawBolt(b.pts, flickAlpha, b.width, b.color, b.glow, b.glowBlur);
        if (b.branch)
          drawBolt(b.branch, flickAlpha * .7, b.width * .6, b.color, b.glow, b.glowBlur * .7);

        // Sparks at endpoints
        if (Math.random() < .5) {
          const ep = b.pts[b.pts.length - 1];
          drawSpark(ep.x, ep.y, flickAlpha * (Math.random() * .6 + .4));
        }
        if (Math.random() < .3) {
          drawSpark(b.pts[0].x, b.pts[0].y, flickAlpha * .5);
        }
      }

      if (b.life >= b.maxLife) bolts.splice(i, 1);
    }
  })();
})();
</script>
</body>
</html>
